<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <meta charset="UTF-8" />
</head>
<body>

  <h2>💰 Add Entry</h2>

  <input type="number" id="amount" placeholder="Amount"><br><br>

  <select id="type">
    <option value="expense">Expense</option>
    <option value="investment">Investment</option>
    <option value="transfer">Transfer</option>
  </select><br><br>

  <select id="category">
    <option>Food</option>
    <option>Petrol</option>
    <option>EMI</option>
    <option>LIC</option>
    <option>Shopping</option>
    <option>Other</option>
  </select><br><br>

  <select id="account">
    <option value="main">Main</option>
    <option value="savingsA">Savings A</option>
    <option value="savingsB">Savings B</option>
  </select><br><br>

  <input type="text" id="notes" placeholder="Notes"><br><br>

  <button onclick="saveEntry()">Save Entry</button>

  <hr>

  <h3>📋 Entries</h3>
  <ul id="entryList"></ul>

  <hr>

  <h3>💰 Balances</h3>
  <p>Main: ₹<span id="mainBalance">0</span></p>
  <p>Savings A: ₹<span id="savingsABalance">0</span></p>
  <p>Savings B: ₹<span id="savingsBBalance">0</span></p>

  <hr>

  <h3>💳 Loans</h3>

  <input type="text" id="loanName" placeholder="Loan Name"><br><br>
  <input type="number" id="loanTotal" placeholder="Total Amount"><br><br>
  <input type="number" id="loanEMI" placeholder="EMI Amount"><br><br>

  <button onclick="addLoan()">Add Loan</button>

  <ul id="loanList"></ul>

  <!-- ORDER MATTERS -->
  <script src="js/storage.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/entries.js"></script>
  <script src="js/loans.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
