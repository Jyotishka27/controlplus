<body>

<div class="container">

  <div class="card">
    <h2>💰 Add Entry</h2>

    <input type="number" id="amount" placeholder="Amount">

    <select id="type">
      <option value="expense">Expense</option>
      <option value="investment">Investment</option>
      <option value="transfer">Transfer</option>
    </select>

    <select id="category">
      <option>Food</option>
      <option>Petrol</option>
      <option>EMI</option>
      <option>LIC</option>
      <option>Shopping</option>
      <option>Other</option>
    </select>

    <select id="account">
      <option value="main">Main</option>
      <option value="savingsA">Savings A</option>
      <option value="savingsB">Savings B</option>
    </select>

    <input type="text" id="notes" placeholder="Notes">

    <button onclick="saveEntry()">Save Entry</button>
  </div>

  <div class="card">
    <h3>📋 Entries</h3>
    <ul id="entryList"></ul>
  </div>

  <div class="card">
    <h3>💰 Balances</h3>
    <div class="grid">
      <div>Main: ₹<span id="mainBalance" class="highlight">0</span></div>
      <div>Savings A: ₹<span id="savingsABalance" class="highlight">0</span></div>
      <div>Savings B: ₹<span id="savingsBBalance" class="highlight">0</span></div>
    </div>
  </div>

  <div class="card">
    <h3>📊 Net Worth</h3>
    <p>Total Savings: ₹<span id="totalSavings"></span></p>
    <p>Total Loans: ₹<span id="totalLoans"></span></p>
    <h4>Net Worth: ₹<span id="netWorth" class="highlight"></span></h4>
  </div>

  <div class="card">
    <h3>📈 Monthly Insights</h3>
    <p>Total Spent: ₹<span id="totalSpent"></span></p>
    <p>Total Invested: ₹<span id="totalInvested"></span></p>
    <p>Top Category: <span id="topCategory"></span></p>
    <p>EMI Paid: ₹<span id="emiPaid"></span></p>
  </div>

  <div class="card">
    <h3>💳 Loans</h3>

    <input type="text" id="loanName" placeholder="Loan Name">
    <input type="number" id="loanTotal" placeholder="Total Amount">
    <input type="number" id="loanEMI" placeholder="EMI Amount">

    <button onclick="addLoan()">Add Loan</button>

    <ul id="loanList"></ul>
  </div>

</div>

<!-- Scripts -->
<script src="js/storage.js"></script>
<script src="js/balance.js"></script>
<script src="js/entries.js"></script>
<script src="js/loans.js"></script>
<script src="js/insights.js"></script>
<script src="js/app.js"></script>

</body>
