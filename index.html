<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Control+</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-gray-900 text-white p-6">
    <h1 class="text-2xl font-semibold mb-8">💰 Control+</h1>

    <nav class="space-y-4">
      <button class="block w-full text-left hover:text-blue-400">Dashboard</button>
      <button class="block w-full text-left hover:text-blue-400">Entries</button>
      <button class="block w-full text-left hover:text-blue-400">Insights</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-6 overflow-y-auto">

    <!-- HEADER -->
    <h2 class="text-xl font-semibold mb-6">March 2026</h2>

    <!-- BALANCE CARDS -->
    <div class="grid grid-cols-3 gap-6 mb-6">

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">Main Balance</p>
        <h1 id="mainBalance" class="text-2xl font-semibold mt-2">₹0</h1>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">Savings A</p>
        <h1 id="savingsA" class="text-2xl font-semibold mt-2">₹0</h1>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">Savings B</p>
        <h1 id="savingsB" class="text-2xl font-semibold mt-2">₹0</h1>
      </div>

    </div>

    <!-- ENTRY FORM -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <h3 class="text-lg font-semibold mb-4">Add Entry</h3>

      <div class="grid grid-cols-5 gap-3">

        <input id="amount" type="number" placeholder="Amount"
          class="border p-2 rounded-lg" />

        <select id="type" class="border p-2 rounded-lg">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>

        <select id="category" class="border p-2 rounded-lg">
          <option value="food">Food</option>
          <option value="transport">Transport</option>
        </select>

        <select id="account" class="border p-2 rounded-lg">
          <option value="main">Main</option>
          <option value="savingsA">Savings A</option>
          <option value="savingsB">Savings B</option>
        </select>

        <button onclick="saveEntry()"
          class="bg-blue-600 text-white rounded-lg hover:bg-blue-700">
          Save
        </button>

      </div>
    </div>

    <!-- INSIGHTS -->
    <div class="grid grid-cols-3 gap-6 mb-6">

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">Total Spent</p>
        <h2 id="totalSpent" class="text-xl font-semibold mt-2">₹0</h2>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">Total Invested</p>
        <h2 id="totalInvested" class="text-xl font-semibold mt-2">₹0</h2>
      </div>

      <div class="bg-white p-5 rounded-xl shadow">
        <p class="text-gray-500 text-sm">EMI Paid</p>
        <h2 id="emiPaid" class="text-xl font-semibold mt-2">₹0</h2>
      </div>

    </div>

    <!-- ENTRIES TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h3 class="text-lg font-semibold mb-4">Entries</h3>

      <table class="w-full text-left">
        <thead>
          <tr class="text-gray-500 text-sm border-b">
            <th class="pb-2">Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Account</th>
          </tr>
        </thead>

        <tbody id="entriesList" class="text-sm">
          <!-- JS will render -->
        </tbody>
      </table>
    </div>

  </main>

</div>

<script src="./storage.js"></script>
<script src="./balance.js"></script>
<script src="./entries.js"></script>
<script src="./insights.js"></script>
<script src="./loans.js"></script>
<script src="./app.js"></script>
  
</body>
</html>
