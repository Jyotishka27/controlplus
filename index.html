<body>

  <!-- HEADER -->
  <div class="header">
    <h1>💸 Control+</h1>
    <p id="currentMonth">March 2026</p>
  </div>

  <div class="container">

    <!-- ADD ENTRY -->
    <div class="card">
      <h2>💰 Add Entry</h2>

      <div class="form-row">
        <input type="number" id="amount" placeholder="Amount">

        <select id="type">
          <option value="expense">Expense</option>
          <option value="investment">Investment</option>
          <option value="transfer">Transfer</option>
        </select>
      </div>

      <div class="form-row">
        <select id="category">
          <option>Food</option>
          <option>Petrol</option>
          <option>EMI</option>
          <option>LIC</option>
          <option>Shopping</option>
          <option>Other</option>
        </select>

        <select id="account">
          <option value="main">Main</option>
          <option value="savingsA">Savings A</option>
          <option value="savingsB">Savings B</option>
        </select>
      </div>

      <input type="text" id="notes" placeholder="Notes">

      <button class="primary-btn" onclick="saveEntry()">Save Entry</button>
    </div>

    <!-- TOP STATS -->
    <div class="grid-3">

      <div class="card stat">
        <p>💰 Main Balance</p>
        <h2>₹<span id="mainBalance">0</span></h2>
      </div>

      <div class="card stat">
        <p>🏦 Savings A</p>
        <h2>₹<span id="savingsABalance">0</span></h2>
      </div>

      <div class="card stat">
        <p>🏦 Savings B</p>
        <h2>₹<span id="savingsBBalance">0</span></h2>
      </div>

    </div>

    <!-- NET WORTH -->
    <div class="card">
      <h3>📊 Net Worth</h3>
      <div class="grid-2">
        <div>Total Savings<br><span id="totalSavings" class="highlight"></span></div>
        <div>Total Loans<br><span id="totalLoans" class="highlight"></span></div>
      </div>
      <h2 class="net-worth">₹<span id="netWorth"></span></h2>
    </div>

    <!-- INSIGHTS -->
    <div class="card">
      <h3>📈 Monthly Insights</h3>

      <div class="grid-2">
        <div>
          Total Spent<br>
          <span id="totalSpent" class="expense"></span>
        </div>

        <div>
          Total Invested<br>
          <span id="totalInvested" class="income"></span>
        </div>

        <div>
          EMI Paid<br>
          <span id="emiPaid"></span>
        </div>

        <div>
          Top Category<br>
          <span id="topCategory"></span>
        </div>
      </div>
    </div>

    <!-- ENTRIES -->
    <div class="card">
      <h3>📋 Entries</h3>
      <ul id="entryList" class="entry-list"></ul>
    </div>

    <!-- LOANS -->
    <div class="card">
      <h3>💳 Loans</h3>

      <div class="form-row">
        <input type="text" id="loanName" placeholder="Loan Name">
        <input type="number" id="loanTotal" placeholder="Total Amount">
      </div>

      <div class="form-row">
        <input type="number" id="loanEMI" placeholder="EMI Amount">
        <button class="secondary-btn" onclick="addLoan()">Add Loan</button>
      </div>

      <ul id="loanList" class="loan-list"></ul>
    </div>

  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/entries.js"></script>
  <script src="js/loans.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/app.js"></script>

</body>
