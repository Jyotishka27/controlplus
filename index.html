<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
</head>
<body>

  <h2>💰 Add Entry</h2>

  <input type="number" id="amount" placeholder="Amount"><br><br>

  <select id="type">
    <option value="expense">Expense</option>
    <option value="investment">Investment</option>
    <option value="transfer">Transfer</option>
  </select><br><br>

  <select id="category">
    <option>Food</option>
    <option>Petrol</option>
    <option>EMI</option>
    <option>LIC</option>
    <option>Other</option>
  </select><br><br>

  <select id="account">
    <option value="main">Main</option>
    <option value="savingsA">Savings A</option>
    <option value="savingsB">Savings B</option>
  </select><br><br>

  <input type="text" id="notes" placeholder="Notes"><br><br>

  <button onclick="saveEntry()">Save Entry</button>

  <hr>

  <h3>📋 Entries</h3>
  <ul id="entryList"></ul>

  <script src="./app.js"></script>

</body>
</html>
